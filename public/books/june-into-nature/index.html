<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' file:; script-src 'self' file:; frame-src 'self' file:; img-src 'self' data: file:; font-src 'self' data: file:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'" />
    <title>六月，向自然退一步</title>
    <link rel="stylesheet" href="./_reader/shell.css" />
  </head>
  <body>
    <main class="publication-shell">
      <header class="publication-toolbar">
        <h1>六月，向自然退一步</h1>
        <div class="publication-toolbar__controls">
          <button type="button" data-action="previous" aria-label="上一页">‹</button>
          <span data-page-label aria-live="polite">正在打开…</span>
          <button type="button" data-action="next" aria-label="下一页">›</button>
          <button type="button" data-action="reset">重置互动</button>
          <button type="button" data-action="fullscreen">全屏</button>
        </div>
      </header>
      <div class="publication-reader-frame">
        <iframe title="六月，向自然退一步" src="./reader.html"></iframe>
        <button class="publication-hit publication-hit--previous" type="button" data-action="previous" aria-label="上一页"></button>
        <button class="publication-hit publication-hit--next" type="button" data-action="next" aria-label="下一页"></button>
      </div>
      <p class="publication-error" data-error hidden></p>
    </main>
    <script src="./_reader/shell.js"></script>
  </body>
</html>
